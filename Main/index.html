<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Archiwum Scenariuszy • Warhammer 40k</title>
  <style>
    :root {
      --bg-1: #06080f;
      --bg-2: #101827;
      --panel: rgba(17, 24, 39, 0.78);
      --panel-strong: rgba(17, 24, 39, 0.95);
      --line: rgba(250, 204, 21, 0.25);
      --line-strong: rgba(250, 204, 21, 0.5);
      --gold: #fbbf24;
      --text: #f3f4f6;
      --muted: #c9ced6;
      --ok: #67e8f9;
      --radius: 18px;
      --shadow: 0 12px 36px rgba(0, 0, 0, 0.45);
    }

    * { box-sizing: border-box; }
    html, body { min-height: 100%; }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--text);
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      background:
        radial-gradient(1500px 900px at 12% 22%, rgba(255, 66, 128, 0.24), transparent 58%),
        radial-gradient(1100px 700px at 84% 8%, rgba(251, 191, 36, 0.12), transparent 60%),
        radial-gradient(900px 620px at 74% 85%, rgba(103, 232, 249, 0.09), transparent 64%),
        linear-gradient(135deg, rgba(255, 77, 136, 0.26) 0%, rgba(20, 14, 27, 0.3) 38%, rgba(5, 8, 15, 0.94) 100%),
        radial-gradient(circle at 14% 58%, rgba(255, 188, 214, 0.24) 0 2px, rgba(0, 0, 0, 0) 2.7px) 0 0 / 18px 18px,
        radial-gradient(circle at 16% 60%, rgba(9, 10, 15, 0.82) 0 4.8px, rgba(0, 0, 0, 0) 5.8px) 0 0 / 22px 22px,
        linear-gradient(180deg, #04050b 0%, var(--bg-1) 46%, var(--bg-2) 100%);
      background-attachment: fixed;
      overflow-x: hidden;
    }

    .stars,
    .stars::before,
    .stars::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        radial-gradient(2px 2px at 20% 20%, rgba(255,255,255,0.5), transparent),
        radial-gradient(1px 1px at 80% 35%, rgba(255,255,255,0.45), transparent),
        radial-gradient(1.5px 1.5px at 35% 75%, rgba(255,255,255,0.4), transparent),
        radial-gradient(1px 1px at 60% 60%, rgba(255,255,255,0.35), transparent);
      animation: drift 28s linear infinite;
      opacity: 0.3;
      z-index: 0;
    }

    .stars::before { animation-duration: 38s; opacity: 0.24; }
    .stars::after { animation-duration: 52s; opacity: 0.16; }

    @keyframes drift {
      from { transform: translateY(0px); }
      to { transform: translateY(-90px); }
    }

    .wrap {
      position: relative;
      z-index: 1;
      width: min(1100px, 92vw);
      margin: 28px auto 48px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 24px;
      padding: 22px 24px;
      background: linear-gradient(130deg, rgba(30,41,59,0.85), rgba(17,24,39,0.95));
      box-shadow: var(--shadow);
      margin-bottom: 18px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: clamp(1.5rem, 3.5vw, 2.2rem);
      color: var(--gold);
      letter-spacing: 0.5px;
    }

    .hero p {
      margin: 0;
      color: var(--muted);
      max-width: 720px;
      line-height: 1.6;
    }

    .aquila {
      width: 260px;
      height: 84px;
      opacity: 0.96;
      object-fit: contain;
      filter: invert(1) brightness(1.25) drop-shadow(0 0 10px rgba(251,191,36,0.35));
      animation: pulse 4s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin: 0 0 18px;
      background: var(--panel);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--muted);
      font-size: 0.95rem;
      backdrop-filter: blur(4px);
    }

    .refresh-btn {
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      font-weight: 700;
      color: #101827;
      background: linear-gradient(180deg, #fcd34d, #f59e0b);
    }

    details.stage {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      backdrop-filter: blur(5px);
      margin-bottom: 12px;
      overflow: hidden;
      box-shadow: var(--shadow);
    }

    details.stage[open] {
      border-color: var(--line-strong);
      background: var(--panel-strong);
    }

    summary {
      cursor: pointer;
      list-style: none;
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.2px;
      background: linear-gradient(90deg, rgba(251,191,36,0.08), rgba(103,232,249,0.04));
    }

    summary::after {
      content: "▾";
      transition: transform 0.25s ease;
      color: var(--ok);
      font-size: 1rem;
    }

    details[open] summary::after { transform: rotate(180deg); }
    summary::-webkit-details-marker { display: none; }

    .table-wrap { padding: 12px; }

    table {
      width: 100%;
      table-layout: fixed;
      border-collapse: collapse;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(2, 6, 23, 0.45);
    }

    th, td {
      border-bottom: 1px solid rgba(255,255,255,0.08);
      padding: 10px 12px;
      text-align: left;
      font-size: 0.95rem;
    }

    th {
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-size: 0.78rem;
      background: rgba(15, 23, 42, 0.85);
    }

    tr:last-child td { border-bottom: none; }

    .path { color: #dbe3ee; word-break: break-word; }

    th:nth-child(1), td:nth-child(1) { width: 70%; }
    th:nth-child(2), td:nth-child(2) { width: 30%; }
    td:nth-child(2) { text-align: center; }

    .btn {
      display: inline-block;
      text-decoration: none;
      font-weight: 700;
      font-size: 0.86rem;
      color: #101827;
      background: linear-gradient(180deg, #fcd34d, #f59e0b);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 999px;
      padding: 7px 12px;
    }

    .empty-row { color: #9ca3af; text-align: center; }

    @media (max-width: 760px) {
      .hero { grid-template-columns: 1fr; }
      .aquila { width: 220px; height: 72px; }
      .toolbar { flex-direction: column; align-items: flex-start; }
      th:nth-child(1), td:nth-child(1) { width: auto; }
    }
  </style>
</head>
<body>
  <div class="stars" aria-hidden="true"></div>
  <main class="wrap">
    <section class="hero">
      <div>
        <h1>Archiwum Scenariuszy TTRPG</h1>
        <p>
          Szybka nawigacja po materiałach kampanii. Kliknij <strong>Odśwież</strong>, aby wczytać aktualną listę plików
          ze wskazanych folderów repozytorium.
        </p>
      </div>
      <img class="aquila" src="dice_no_background.png" alt="Logo kostek" />
    </section>

    <section class="toolbar">
      <span id="status">Status: gotowe do odświeżenia.</span>
      <button id="refreshButton" class="refresh-btn" type="button">Odśwież</button>
    </section>

    <div id="stagesContainer"></div>
  </main>

  <script>
    const sectionConfig = [
      { id: 'analizy', title: 'Analizy', segments: ['Analizy'] },
      { id: 'notatki', title: 'Warhammer40k/Notatki', segments: ['Warhammer40k', 'Notatki'] },
      { id: 'gilead', title: 'Warhammer40k/Gilead', segments: ['Warhammer40k', 'Gilead'] },
      { id: 'oko', title: 'Warhammer40k/Scenariusz_Oko', segments: ['Warhammer40k', 'Scenariusz_Oko'] },
      { id: 'rico', title: 'Warhammer40k/Scenariusz_Rico', segments: ['Warhammer40k', 'Scenariusz_Rico'] },
      { id: 'epilog', title: 'Warhammer40k/Scenariusz_Epilog', segments: ['Warhammer40k', 'Scenariusz_Epilog'] }
    ];

    const statusElement = document.getElementById('status');
    const stagesContainer = document.getElementById('stagesContainer');
    const allowedExtensions = new Set(['.html', '.md', '.txt', '.png']);

    function createStageMarkup(title, id) {
      return `
        <details class="stage">
          <summary>${title}</summary>
          <div class="table-wrap">
            <table>
              <thead><tr><th>Plik</th><th>Akcja</th></tr></thead>
              <tbody id="tbody-${id}">
                <tr><td class="empty-row" colspan="2">Brak danych. Kliknij „Odśwież”.</td></tr>
              </tbody>
            </table>
          </div>
        </details>
      `;
    }

    function buildStageShell() {
      stagesContainer.innerHTML = sectionConfig
        .map(section => createStageMarkup(section.title, section.id))
        .join('');
    }

    async function getSubdirectory(rootHandle, segments) {
      let currentHandle = rootHandle;
      for (const segment of segments) {
        currentHandle = await currentHandle.getDirectoryHandle(segment);
      }
      return currentHandle;
    }

    async function getFilesFromDirectory(dirHandle) {
      const files = [];
      for await (const entry of dirHandle.values()) {
        if (entry.kind !== 'file') continue;
        const lowerName = entry.name.toLowerCase();
        const extension = lowerName.slice(lowerName.lastIndexOf('.'));
        if (allowedExtensions.has(extension)) {
          files.push(entry.name);
        }
      }
      return files.sort((a, b) => a.localeCompare(b, 'pl'));
    }

    function renderSectionRows(sectionId, files, segments) {
      const tbody = document.getElementById(`tbody-${sectionId}`);
      if (!tbody) return;

      if (!files.length) {
        tbody.innerHTML = '<tr><td class="empty-row" colspan="2">Brak pasujących plików.</td></tr>';
        return;
      }

      tbody.innerHTML = files
        .map(fileName => {
          const hrefPath = ['..', ...segments, fileName].map(part => encodeURIComponent(part)).join('/').replace('..', '..');
          return `
            <tr>
              <td class="path">${fileName}</td>
              <td><a class="btn" href="${hrefPath}" target="_blank" rel="noopener noreferrer">Otwórz</a></td>
            </tr>
          `;
        })
        .join('');
    }

    async function refreshFileList() {
      if (!('showDirectoryPicker' in window)) {
        statusElement.textContent = 'Status: przeglądarka nie obsługuje File System Access API.';
        return;
      }

      try {
        statusElement.textContent = 'Status: wybierz główny folder repozytorium „Scenariusze”.';
        const rootHandle = await window.showDirectoryPicker({ mode: 'read' });

        for (const section of sectionConfig) {
          const directory = await getSubdirectory(rootHandle, section.segments);
          const files = await getFilesFromDirectory(directory);
          renderSectionRows(section.id, files, section.segments);
        }

        statusElement.textContent = `Status: odświeżono ${new Date().toLocaleTimeString('pl-PL')}.`;
      } catch (error) {
        statusElement.textContent = `Status: nie udało się odświeżyć (${error.message}).`;
      }
    }

    buildStageShell();
    document.getElementById('refreshButton').addEventListener('click', refreshFileList);
  </script>
</body>
</html>
